<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Pelanggaran Siswa</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 { text-align: center; }
    input, button {
      padding: 8px;
      margin: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    .danger {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>📋 Pelanggaran Siswa</h1>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="kelas" placeholder="Kelas">
<input type="text" id="pelanggaran" placeholder="Pelanggaran">
<button onclick="tambahData()">Tambah</button>

<table>
  <thead>
    <tr>
      <th>Nama</th>
      <th>Kelas</th>
      <th>Pelanggaran</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody id="tabel"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbx6aHeYQsrS80ouQcsc3NRkPN13wVb2FdcmA58891-V-9EM3pWzqxIC8JTs7rLehl1y/exec";

// 🔴 KIRIM DATA
function tambahData() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let pelanggaran = document.getElementById("pelanggaran").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      nama,
      kelas,
      pelanggaran
    })
  })
  .then(() => {
    alert("Data berhasil dikirim!");
    ambilData(); // refresh data
  });
}

// 🔥 AMBIL DATA + HITUNG + MERAH
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      let tabel = document.getElementById("tabel");
      tabel.innerHTML = "";

      let hitung = {};

      // hitung jumlah pelanggaran per nama
      data.slice(1).forEach(d => {
        let nama = d[0];
        if (!hitung[nama]) hitung[nama] = 0;
        hitung[nama]++;
      });

      // tampilkan data
      data.slice(1).forEach(d => {
        let nama = d[0];
        let kelas = d[1];
        let pelanggaran = d[2];
        let total = hitung[nama];

        let merah = total >= 3 ? "danger" : "";

        tabel.innerHTML += `
          <tr class="${merah}">
            <td>${nama}</td>
            <td>${kelas}</td>
            <td>${pelanggaran}</td>
            <td>${total}</td>
          </tr>
        `;
      });
    });
}

// jalan saat web dibuka
ambilData();
</script>

</body>
</html>
