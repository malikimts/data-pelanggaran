<script>
const API = "https://script.google.com/macros/s/AKfycbyQc6z_SwyNSYCpjpTlxKY1ar7PFSy2vPkcXKTgGuXSLkw0xv02l07DSguCgRMQQPT2/exec";

let semuaData = [];
let dataAsli = []; // simpan data asli

// KIRIM DATA
function tambahData() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let pelanggaran = document.getElementById("pelanggaran").value;
  let kampus = document.getElementById("kampus").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran, kampus })
  })
  .then(() => {
    alert("Data masuk!");
    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data;
      dataAsli = [...data]; // simpan full data
      tampilkanData();
    });
}

// TAMPILKAN DATA
function tampilkanData() {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let hitung = {};
  let totalSemua = 0;

  // HITUNG BERDASARKAN NAMA + KELAS
  semuaData.forEach(d => {
    let key = d[0] + "_" + d[1];
    if (!hitung[key]) hitung[key] = 0;
    hitung[key]++;
  });

  semuaData.forEach(d => {
    let key = d[0] + "_" + d[1];
    let total = hitung[key];
    totalSemua++;

    let merah = total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${d[0]}</td>
        <td>${d[1]}</td>
        <td>${d[2]}</td>
        <td>${total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pelanggaran: " + totalSemua;
}

// SEARCH (FIX)
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  if (!keyword) {
    semuaData = [...dataAsli];
  } else {
    semuaData = dataAsli.filter(d =>
      d[0].toLowerCase().includes(keyword)
    );
  }

  tampilkanData();
}

// AUTO REFRESH
ambilData();
setInterval(ambilData, 3000);
</script>
