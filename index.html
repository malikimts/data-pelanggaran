<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pelanggaran Siswa MTSN</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1faa59, #76ff7a);
  padding: 20px;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.logo {
  position: absolute;
  left: 0;
  display: flex;
  gap: 5px;
}

.logo img {
  width: 45px;
}

.slogan {
  text-align: center;
  font-style: italic;
  color: #2e7d32;
  margin-top: 10px;
}

/* tombol kampus */
.nav {
  text-align: center;
  margin: 15px 0;
}

.nav button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #ccc;
  cursor: pointer;
}

.nav button.active {
  background: #1faa59;
  color: white;
}

/* animasi */
.animasi {
  text-align: center;
  margin: 10px;
  animation: naikTurun 2s infinite;
}

@keyframes naikTurun {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.tambah {
  background: #1faa59;
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #1faa59;
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
}

.danger {
  background: #ffdddd;
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Logo_Kementerian_Agama.svg/512px-Logo_Kementerian_Agama.svg.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Logo_OSIS.svg">
  </div>
  <h2>Pelanggaran Siswa MTSN Kota Madiun</h2>
</div>

<div class="slogan">
  "Disiplin hari ini, sukses di masa depan. Jangan melanggar aturan!"
</div>

<div class="animasi">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="100">
</div>

<!-- NAV KAMPUS -->
<div class="nav">
  <button id="btn1" class="active" onclick="gantiKampus('kampus1')">Kampus 1</button>
  <button id="btn3" onclick="gantiKampus('kampus3')">Kampus 3</button>
</div>

<!-- INPUT -->
<input type="text" id="nama" placeholder="Nama">
<input type="text" id="kelas" placeholder="Kelas">
<input type="text" id="pelanggaran" placeholder="Pelanggaran">

<button class="tambah" onclick="tambahData()">Tambah</button>

<br>

<input type="text" id="search" placeholder="🔍 Cari nama..." onkeyup="filterData()">

<h3 id="judulKampus">Data Kampus 1</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>pelanggaran</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyqRKECjb5ffsVnz4dHJ8KvkElhPZuAveSm3OEmm1rTRAJX80_l2QJEGVHvo_Ji0Ibx/exec";

let semuaData = [];
let kampusAktif = "kampus1";

// GANTI KAMPUS
function gantiKampus(kampus) {
  kampusAktif = kampus;

  document.getElementById("btn1").classList.remove("active");
  document.getElementById("btn3").classList.remove("active");

  if (kampus == "kampus1") {
    document.getElementById("btn1").classList.add("active");
    document.getElementById("judulKampus").innerText = "Data Kampus 1";
  } else {
    document.getElementById("btn3").classList.add("active");
    document.getElementById("judulKampus").innerText = "Data Kampus 3";
  }

  tampilkanData();
}

// TAMBAH DATA
function tambahData() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let tindakan = document.getElementById("tindakan").value;

  if (!nama || !kelas || !tindakan) {
    alert("Isi semua!");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      nama: nama,
      kelas: kelas,
      pelanggaran: tindakan,
      kampus: kampusAktif
    })
  })
  .then(() => {
    alert("Data masuk!");
    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data.slice(1);
      tampilkanData();
    });
}

// TAMPILKAN
function tampilkanData() {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let dataFilter = semuaData.filter(d => d[4] == kampusAktif);

  let hitung = {};

  dataFilter.forEach(d => {
    let nama = d[0];
    if (!hitung[nama]) hitung[nama] = 0;
    hitung[nama]++;
  });

  dataFilter.forEach(d => {
    let total = hitung[d[0]];
    let merah = total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${d[0]}</td>
        <td>${d[1]}</td>
        <td>${d[2]}</td>
        <td>${total}</td>
      </tr>
    `;
  });
}

// SEARCH
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  let hasil = semuaData.filter(d =>
    d[0].toLowerCase().includes(keyword)
  );

  semuaData = hasil;
  tampilkanData();
}

// AUTO REFRESH
ambilData();
setInterval(ambilData, 3000);
</script>

</body>
</html>
