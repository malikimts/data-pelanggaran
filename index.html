<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pelanggaran Siswa</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    h1 { text-align:center; }
    input, button { padding:8px; margin:5px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; background:white; }
    th, td { border:1px solid #ccc; padding:10px; text-align:center; }
    .danger { color:red; font-weight:bold; }
  </style>
</head>
<body>

<h1>📋 Pelanggaran Siswa</h1>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="kelas" placeholder="Kelas">
<input type="text" id="pelanggaran" placeholder="Pelanggaran">
<button onclick="tambahData()">Tambah</button>

<table>
  <thead>
    <tr>
      <th>Nama</th>
      <th>Kelas</th>
      <th>Pelanggaran</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody id="tabel"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbxGOh1v4hE-j-cXjk1GzvpCHsyBCtWGoWRuUiHOAgWmj83AZ6arHVrBraw8dJiuruv7/exec";

// kirim data
function tambahData() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let pelanggaran = document.getElementById("pelanggaran").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran })
  })
  .then(() => {
    alert("Data masuk!");
    ambilData();
  });
}

// ambil data
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      let tabel = document.getElementById("tabel");
      tabel.innerHTML = "";

      let hitung = {};

      data.slice(1).forEach(d => {
        let nama = d[0];
        if (!hitung[nama]) hitung[nama] = 0;
        hitung[nama]++;
      });

      data.slice(1).forEach(d => {
        let nama = d[0];
        let kelas = d[1];
        let pelanggaran = d[2];
        let total = hitung[nama];

        let merah = total >= 3 ? "danger" : "";

        tabel.innerHTML += `
          <tr class="${merah}">
            <td>${nama}</td>
            <td>${kelas}</td>
            <td>${pelanggaran}</td>
            <td>${total}</td>
          </tr>
        `;
      });
    });
}

// auto jalan + auto refresh
ambilData();
setInterval(ambilData, 3000);
</script>

</body>
</html>
