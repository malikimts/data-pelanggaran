<script>
// API PER KELAS
const API_KELAS7 = "https://script.google.com/macros/s/AKfycbwDp5q4G7prQqOZE67WbSbNeZ_mMbOxml26ypXFsKk-9igmqGyY6AjsOnqVfjS0RmiK/exec";
const API_KELAS8 = "https://script.google.com/macros/s/AKfycby_uWxsCeJgi94WDq7BssAHzAC0olvK8dReTMX-jQ4w-k_guJIcSAeaGZOeL6cmlgOU/exec";
const API_KELAS9 = "https://script.google.com/macros/s/AKfycbx_OD1NPcDKbOIzvqrtHRJoM_c-eE9JIzEzE8jX-cDKR08vCmy-j5ZKAWmLFrBKqFuv/exec";

// DEFAULT AMBIL DATA (misalnya kelas 7 dulu)
let API = API_KELAS7;

let semuaData = [];
let dataAsli = [];

// KIRIM DATA (AUTO KE SHEET SESUAI KELAS)
function tambahData() {
  let nama = document.getElementById("nama").value;
  let kelas = document.getElementById("kelas").value;
  let pelanggaran = document.getElementById("pelanggaran").value;
  let kampus = document.getElementById("kampus").value;

  if (!nama || !kelas || !pelanggaran) {
    alert("Isi semua!");
    return;
  }

  let apiTujuan = "";

  if (kelas.startsWith("7")) {
    apiTujuan = API_KELAS7;
  } else if (kelas.startsWith("8")) {
    apiTujuan = API_KELAS8;
  } else if (kelas.startsWith("9")) {
    apiTujuan = API_KELAS9;
  } else {
    alert("Format kelas harus 7A / 8B / 9C!");
    return;
  }

  fetch(apiTujuan, {
    method: "POST",
    body: JSON.stringify({ nama, kelas, pelanggaran, kampus })
  })
  .then(() => {
    alert("Data masuk sesuai jenjang!");
    ambilData();
  });
}

// AMBIL DATA
function ambilData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      semuaData = data.slice(1);
      dataAsli = [...semuaData];
      tampilkanData();
    });
}

// TAMPILKAN DATA
function tampilkanData() {
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  let hitung = {};
  let totalSemua = 0;

  semuaData.forEach(d => {
    let nama = d[0];
    if (!hitung[nama]) hitung[nama] = 0;
    hitung[nama]++;
  });

  semuaData.forEach(d => {
    let total = hitung[d[0]];
    totalSemua++;

    let merah = total >= 3 ? "danger" : "";

    tabel.innerHTML += `
      <tr class="${merah}">
        <td>${d[0]}</td>
        <td>${d[1]}</td>
        <td>${d[2]}</td>
        <td>${total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total Pelanggaran: " + totalSemua;
}

// SEARCH (FIX BIAR GAK NGERUSAK DATA)
function filterData() {
  let keyword = document.getElementById("search").value.toLowerCase();

  if (!keyword) {
    semuaData = [...dataAsli];
  } else {
    semuaData = dataAsli.filter(d =>
      d[0].toLowerCase().includes(keyword)
    );
  }

  tampilkanData();
}

// AUTO LOAD
ambilData();
setInterval(ambilData, 3000);
</script>
